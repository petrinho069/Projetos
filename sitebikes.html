<!DOCTYPE html> 
<html lang="pt-br">
    <head>
        <link rel="stylesheet" href="sitebikes.css">
        <link rel="icon" href="img/Petrinhosbikelogo.png" type="image/x-icon">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Home</title>
    </head>
    <body>
        <header>
            <!--cabeçalho-->
            <!--logo-->
            <img id="logo" src="img/Petrinhosbikelogo.png" alt="logo da loja">

                <form class="pesquisa">
                    <!--pesquisar-->
                        <input type="text" placeholder="Pesquisar">
                        <input type="submit" value="Buscar">
                </form>
                <!--botao do carrinho-->
                <a href="#" class="carrinho">Carrinho</a>
                <!--botao para login-->
                <button id="login">Login</button> 

        </header>

        <main>
            <!--corpo do site-->

            <section class="linha">
                <h2>Bicicletas</h2>
            
                <div class="produtos">

                    <!--torna um card clicavel-->
                    <!--produtos devem ser classe produto para serem cards-->
                    <a href="#" class="produto">
                        <img src="img/bicicleta1.webp">
                        <p>Bicicleta Aro 29</p>
                        <p>R$ 1200.00</p>
                    </a>
            
                    <a href="#" class="produto">
                        <img src="img/bicicleta2.jpg">
                        <p>Bicicleta Speed</p>
                        <p>R$ 1800.00</p>
                    </a>

                    <a href="#" class="produto">
                        <img src="img/bicicleta3.jpg">
                        <p>Bicicleta Vulcano Aro 29</p>
                        <p>R$ 1400.00</p>
                    </a>
                </div>
            </section>

        </main>
    </body>
</html>
