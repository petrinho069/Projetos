<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padaria da Raylana</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TOPINHO -->
  <section class="hero">
    <div class="container">

      <div class="topbar">

      </div>

      <div class="store-card">

        <div class="store-left">
          <h1>Padaria da Raylana</h1>
          <p>Rua Disguidoida, 20 - Tenoné, Belém, Pa</p>
        </div>

        <div class="logo-area">
          <div class="logo">PR</div>
        </div>

        <div class="store-right">
          <p><span class="status">● Aberto</span></p>
          <p>Valor mínimo: não temos</p>
          <p>Entrega: 45 - 60 min</p>
        </div>

      </div>

    </div>
  </section>

  <!-- FILTRO -->
  <section class="filters container">
    <select>
      <option>Filtrar por categoria</option>
    </select>

    <input type="text" placeholder="Pesquisar um produto...">
  </section>

  <!-- PRODUTOS -->
  <section class="container">
    <h2 class="title">CARDÁPIO</h2>

    <div class="grid">

      <!-- CARD -->
      <div class="card">
        <img src="https://images.unsplash.com/photo-1608198093002-ad4e005484ec" />
        <h3>Pão Francês</h3>
        <p>R$ 0,99</p>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1585478259715-1cbb6f3a4fbc" />
        <h3>Pão de Creme</h3>
        <p>R$ 1,50</p>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1608198093002-ad4e005484ec" />
        <h3>Pão Liso</h3>
        <p>R$ 1,10</p>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1555507036-ab1f4038808a" />
        <h3>Pão de Coco</h3>
        <p>R$ 1,10</p>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1608198093002-ad4e005484ec" />
        <h3>Pão de Hambúrguer</h3>
        <p>R$ 1,30</p>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1608198093002-ad4e005484ec" />
        <h3>Pão Sovado</h3>
        <p>R$ 8,99</p>
      </div>

    </div>
  </section>

</body>
</html>
